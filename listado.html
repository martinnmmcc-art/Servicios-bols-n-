<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc,
  query, where, orderBy, limit, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey:            'AIzaSyDEbMlfUHgiO_PYhGBWCoSNTMhABiq97OQ',
  authDomain:        'servicios-ya-fd67f.firebaseapp.com',
  projectId:         'servicios-ya-fd67f',
  storageBucket:     'servicios-ya-fd67f.firebasestorage.app',
  messagingSenderId: '493601407784',
  appId:             '1:493601407784:web:82f836cf441748e91c061d'
});

const db   = getFirestore(app);
const auth = getAuth(app);

window._db   = db;
window._auth = auth;
window._fb   = { collection, getDocs, addDoc, query, where, orderBy, limit, serverTimestamp };

onAuthStateChanged(auth, user => {
  window._fbUser = user || null;
});

// Load real data from Firestore and merge with local data
async function syncFirestore() {
  try {
    const [profSnap, comSnap, solSnap, citSnap, convSnap] = await Promise.all([
      getDocs(query(collection(db,'profiles'), where('role','==','profesional'), limit(50))),
      getDocs(collection(db,'comercios')),
      getDocs(collection(db,'solicitudes')),
      getDocs(collection(db,'citas')),
      getDocs(collection(db,'conversaciones')),
    ]);
    if(!profSnap.empty) window._data.profesionales = profSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(!comSnap.empty)  window._data.comercios     = comSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(!solSnap.empty)  window._data.solicitudes   = solSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(!citSnap.empty)  window._data.citas         = citSnap.docs.map(d=>({id:d.id,...d.data()}));
    if(!convSnap.empty) window._data.conversaciones= convSnap.docs.map(d=>({id:d.id,...d.data()}));
    renderList(window._currentTab, '');
    showToast('Datos actualizados desde Firebase ✓');
  } catch(e) {
    console.warn('Firestore sync error:', e.message);
    showToast('Usando datos locales');
  }
}

window._syncFirestore = syncFirestore;
// Auto-sync after a short delay (non-blocking)
setTimeout(syncFirestore, 1500);
</script>

/* ── HELPERS ──────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const ini = n => (n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
function stars(n) {
  const f = Math.round(n||0);
  return `<span class="text-yellow-400">${'★'.repeat(f)}${'☆'.repeat(5-f)}</span>
          <span class="text-gray-500 text-xs ml-1">${(n||0).toFixed(1)}</span>`;
}
function badge(estado) {
  const m = {
    PENDIENTE:'bg-blue-900/60 text-blue-300',
    'EN PROCESO':'bg-amber-900/60 text-amber-300',
    TERMINADO:'bg-green-900/60 text-green-300',
    RECHAZADO:'bg-red-900/60 text-red-300',
    AGENDADA:'bg-green-900/60 text-green-300',
    CANCELADA:'bg-red-900/60 text-red-300',
  };
  return `<span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded ${m[estado]||'bg-gray-800 text-gray-400'}">${estado}</span>`;
}
function showToast(msg) {
  const t = $('toast'); t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0', 2500);
}

function switchTab(tab) {
  window._currentTab = tab;
  $('tab-title').textContent = TITLES[tab];
  $('search-input').value = '';
  // Nav highlight
  ['profesionales','comercios','solicitudes','citas','chat'].forEach(t => {
    const btn = $('nav-'+t);
    btn.classList.remove('nav-active');
    btn.classList.add('nav-icon');
  });
  const active = $('nav-'+tab);
  active.classList.remove('nav-icon');
  active.classList.add('nav-active');
  renderList(tab, '');
}

    </div>

      ${msgs.map((m,i)=>{
        const mine = i%2===0;
        return `<div class="flex flex-col ${mine?'items-end':'items-start'}">
          <div class="max-w-[78%] px-3 py-2 rounded-2xl text-sm leading-relaxed ${mine?'bg-brand text-black rounded-br-sm':'bg-dark3 text-white rounded-bl-sm'}">

          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="flex gap-2 px-4 pb-4 pt-2 border-t border-dark3 sticky bottom-0 bg-dark2">
      <input id="chat-in" type="text" placeholder="Escribí un mensaje..."
        class="flex-1 bg-dark3 border border-dark4 rounded-2xl px-4 py-2.5 text-sm text-white outline-none"
        onkeydown="if(event.key==='Enter'){sendChatMsg('${id}')}"
      />
      <button onclick="sendChatMsg('${id}')"
        class="w-10 h-10 bg-brand rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10L2 3l3.5 7L2 17l16-7z"/></svg>
      </button>

  drawerEl.classList.add('flex');

function sendChatMsg(convId) {
  const input = $('chat-in');
  const text  = input?.value?.trim();
  if (!text) return;
  const conv = window._data.conversaciones.find(c=>c.id===convId);
  if (!conv) return;
  const now  = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  if (!conv.mensajes) conv.mensajes = [];
  conv.mensajes.push({ from:'Yo', texto:text, time });
  input.value = '';
  const list = $('chat-msg-list');
  if (list) {
    const div = document.createElement('div');
    div.className = 'flex flex-col items-end';
    div.innerHTML = `<div class="max-w-[78%] px-3 py-2 rounded-2xl rounded-br-sm text-sm leading-relaxed bg-brand text-black">${text}<div class="text-[10px] mt-1 text-black/50 text-right">${time}</div></div>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }
  // Sync to Firestore if available
  if(window._db && window._fb) {
    const { collection: col, addDoc: add, serverTimestamp: ts } = window._fb;
    add(col(window._db,'mensajes'), { conv_id:convId, texto:text, from_id:window._fbUser?.uid||'demo', created_at:ts() })
      .catch(e=>console.warn('Chat sync error',e));
  }
}
window.sendChatMsg = sendChatMsg;

function guardarSolicitud() {
  const nombre = $('f-nombre')?.value?.trim();
  const desc   = $('f-desc')?.value?.trim();
  const monto  = parseFloat($('f-monto')?.value)||0;
  const estado = $('f-estado')?.value;
  if (!nombre||!desc) { showToast('Completá todos los campos'); return; }
  const sol = { id:'s'+Date.now(), nombre, desc, monto, estado, created_at:new Date().toISOString().split('T')[0], notas:[] };
  window._data.solicitudes.unshift(sol);
  // Firestore sync
  if(window._db && window._fb) {
    const { collection: col, addDoc: add, serverTimestamp: ts } = window._fb;
    add(col(window._db,'solicitudes'),{nombre,desc,monto,estado,cliente_id:window._fbUser?.uid||'demo',notas:[],created_at:ts()})
      .catch(e=>console.warn('Sol sync',e));
  }
  closeAddModal(); renderList('solicitudes',''); switchTab('solicitudes'); showToast('Solicitud creada ✓');
}
window.guardarSolicitud = guardarSolicitud;

function guardarCita() {
  const cliente = $('f-cliente')?.value?.trim()?.toUpperCase();
  const desc    = $('f-desc-cita')?.value?.trim();
  const fecha   = $('f-fecha')?.value;
  const hora    = $('f-hora')?.value;
  if (!cliente||!desc||!fecha||!hora) { showToast('Completá todos los campos'); return; }
  window._data.citas.unshift({ id:'ci'+Date.now(), cliente, desc, fecha, hora, estado:'AGENDADA' });
  closeAddModal(); renderList('citas',''); switchTab('citas'); showToast('Cita agendada ✓');
}
window.guardarCita = guardarCita;

function guardarConv() {
  const para = $('f-para')?.value;
  const msg  = $('f-msg')?.value?.trim();
  if (!msg) { showToast('Escribí un mensaje'); return; }
  const de   = 'Yo';
  const now  = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const conv = { id:'cv'+Date.now(), de, para, fecha:now.toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}).toUpperCase(), mensajes:[{from:de,texto:msg,time}] };
  window._data.conversaciones.unshift(conv);
  closeAddModal(); renderList('chat',''); switchTab('chat'); showToast('Conversación iniciada ✓');
}
window.guardarConv = guardarConv;

function toggleMenu() { showToast('Menú próximamente'); }
window.toggleMenu = toggleMenu;

/* ── BOOT ─────────────────────────────────────────────────── */
renderList('profesionales', '');
</script>
