<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Ya - El Bolsón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; flex-direction: column; color: white; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div>
        <p>Cargando Servicios...</p>
    </div>

    <nav class="bg-green-600 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold text-center"><i class="fas fa-tools mr-2"></i>Servicios Ya - Comarca</h1>
    </nav>

    <main class="p-4" id="app-container">
        <div class="grid grid-cols-2 gap-4" id="grid-servicios">
            </div>
    </main>

    <script>
        // DATOS LOCALES (Para que no se quede cargando nunca más)
        const serviciosLocales = [
 { nombre: 'Electricista', icono: 'fa-bolt', color: 'bg-yellow-500', link: 'electricistas.html' },
            { nombre: 'Plomero', icono: 'fa-faucet', color: 'bg-blue-500' },
            { nombre: 'Gasista', icono: 'fa-fire', color: 'bg-orange-500' },
            { nombre: 'Construcción', icono: 'fa-hammer', color: 'bg-gray-700' },
            { nombre: 'Jardinería', icono: 'fa-leaf', color: 'bg-green-500' },
            { nombre: 'Fletes', icono: 'fa-truck', color: 'bg-red-500' }
        ];

        function renderServicios(datos) {
            const grid = document.getElementById('grid-servicios');
grid.innerHTML = datos.map(s => `
    <a href="listado.html?rubro=${s.nombre}" class="${s.color} text-white p-6 rounded-xl shadow-md flex flex-col items-center justify-center transition-transform active:scale-95">
        <i class="fas ${s.icono} text-3xl mb-2"></i>
        <span class="font-bold text-sm text-center">${s.nombre}</span>
    </a>
`).join('');
            document.getElementById('loader').style.display = 'none';
        }

        // Carga inmediata
        window.onload = () => renderServicios(serviciosLocales);
    </script>
</body>
</html>
