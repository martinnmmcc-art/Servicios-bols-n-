<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Servicios Ya - Patagonia Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0e0e0e; --bg-dark2: #1a1a1a; --primary: #39FF14; }
        body { background-color: var(--bg-dark); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .nav-active { color: var(--primary); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-4 bg-dark border-b border-gray-800">
        <input type="text" placeholder="Buscar en El Bolsón..." class="w-full bg-[#222] border-none rounded-full py-2 px-4 text-sm text-gray-300 focus:ring-1 focus:ring-primary">
    </header>

    <main id="list-container" class="flex-1 overflow-y-auto pb-24 p-4">
        <div class="mb-4">
            <span class="text-primary text-[10px] font-bold uppercase tracking-widest">Lunes 6 de Abril</span>
            <div class="bg-[#1a1a1a] rounded-2xl p-4 mt-2 flex items-center justify-between border border-gray-800" onclick="openDrawer('Martín N.', 'Electricista Matriculado')">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gray-700 rounded-full"></div>
                    <div>
                        <h3 class="font-bold">Martín N.</h3>
                        <p class="text-xs text-gray-500">Electricista Matriculado</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
            </div>
        </div>
    </main>

    <div id="drawer" class="fixed inset-0 bg-black/80 z-50 hidden flex-end items-end">
        <div class="bg-[#121212] w-full max-w-[430px] mx-auto rounded-t-3xl p-6 transition-transform transform translate-y-full overflow-y-auto max-h-[90vh]">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6" onclick="closeDrawer()"></div>
            
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-gray-700 rounded-full border-2 border-primary"></div>
                <div>
                    <h2 id="d-name" class="text-xl font-bold"></h2>
                    <p id="d-job" class="text-primary text-sm font-medium"></p>
                    <div class="flex text-yellow-500 text-xs mt-1">
                        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i>
                        <span class="text-gray-500 ml-2">(4.8)</span>
                    </div>
                </div>
            </div>

            <p class="text-gray-400 text-sm mb-6 leading-relaxed">Especialista en mantenimiento industrial y domiciliario. Atiendo urgencias en toda la Comarca Andina.</p>

            <div class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800 mb-6">
                <h3 class="text-sm font-bold mb-3 uppercase tracking-tighter text-gray-500">Lista de Materiales</h3>
                <textarea id="lista-input" placeholder="Ej: 2 térmicas 20A, cable 2.5mm..." class="w-full bg-[#0e0e0e] border border-gray-800 rounded-lg p-3 text-sm text-white mb-3 h-24 focus:outline-none"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="descargarLista()" class="bg-gray-800 text-xs py-3 rounded-lg font-bold"><i class="fas fa-download mr-1"></i> GUARDAR</button>
                    <button onclick="enviarWhatsApp()" class="bg-primary text-black text-xs py-3 rounded-lg font-bold"><i class="fab fa-whatsapp mr-1"></i> WHATSAPP</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#121212] border-t border-gray-800 safe-bottom z-40 max-w-[430px] mx-auto">
        <div class="flex justify-around py-3">
            <button class="nav-active flex flex-col items-center gap-1">
                <i class="fas fa-user-friends text-lg"></i>
                <span class="text-[9px]">Profesionales</span>
            </button>
            <button class="text-gray-500 flex flex-col items-center gap-1">
                <i class="fas fa-store text-lg"></i>
                <span class="text-[9px]">Comercios</span>
            </button>
            <button class="text-gray-500 flex flex-col items-center gap-1">
                <i class="fas fa-file-signature text-lg"></i>
                <span class="text-[9px]">Solicitudes</span>
            </button>
            <button class="text-gray-500 flex flex-col items-center gap-1">
                <i class="fas fa-calendar-check text-lg"></i>
                <span class="text-[9px]">Citas</span>
            </button>
        </div>
    </nav>

    <script>
        function openDrawer(name, job) {
            document.getElementById('d-name').innerText = name;
            document.getElementById('d-job').innerText = job;
            document.getElementById('drawer').style.display = 'flex';
            setTimeout(() => { document.querySelector('#drawer > div').style.transform = 'translateY(0)'; }, 10);
        }
        function closeDrawer() {
            document.querySelector('#drawer > div').style.transform = 'translateY(100%)';
            setTimeout(() => { document.getElementById('drawer').style.display = 'none'; }, 300);
        }
        function descargarLista() {
            const text = document.getElementById('lista-input').value;
            const blob = new Blob([text], {type: "text/plain"});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "lista-materiales.txt"; a.click();
        }
        function enviarWhatsApp() {
            const text = encodeURIComponent("📋 *Lista de Materiales:*\n" + document.getElementById('lista-input').value);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
