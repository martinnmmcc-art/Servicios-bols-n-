<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patagonia Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0e0e0e; --bg-dark2: #1a1a1a; --primary: #39FF14; }
        body { background-color: var(--bg-dark); color: white; font-family: -apple-system, sans-serif; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn.active { color: var(--primary); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-left">

    <header class="p-4 bg-dark border-b border-gray-800 flex justify-between items-center">
        <h1 id="page-title" class="text-lg font-bold text-primary">Profesionales</h1>
        <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-black font-bold text-xs">MN</div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24 p-4">
        
        <section id="page-pro" class="page active">
            <span class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Lunes 6 de Abril</span>
            <div class="bg-[#1a1a1a] rounded-2xl p-4 mt-2 flex items-center justify-between border border-gray-800" onclick="openDrawer('Martín N.', 'Electricista', 'Especialista en mantenimiento en El Bolsón.')">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center border border-primary/20"><i class="fas fa-bolt text-primary"></i></div>
                    <div><h3 class="font-bold">Martín N.</h3><p class="text-xs text-gray-500">Electricista Matriculado</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
            </div>
        </section>

        <section id="page-tiendas" class="page">
            <div class="bg-[#1a1a1a] rounded-2xl p-4 mb-3 border border-gray-800">
                <h3 class="font-bold">Corralón Comarca</h3>
                <p class="text-xs text-gray-500">Materiales eléctricos y construcción</p>
            </div>
        </section>

        <section id="page-pedidos" class="page text-center pt-10">
            <i class="fas fa-clipboard-list text-gray-700 text-4xl mb-4"></i>
            <p class="text-gray-500">No tenés solicitudes activas.</p>
        </section>

        <section id="page-chat" class="page">
            <div class="flex items-center gap-3 bg-[#1a1a1a] p-4 rounded-xl border border-gray-800">
                <div class="w-10 h-10 bg-gray-700 rounded-full"></div>
                <div class="flex-1">
                    <h4 class="text-sm font-bold">Soporte Patagonia Wall</h4>
                    <p class="text-xs text-gray-500 italic">Hola Martín, ¿en qué podemos ayudarte?</p>
                </div>
                <span class="text-[10px] text-primary">AHORA</span>
            </div>
        </section>

    </main>

    <div id="drawer" class="fixed inset-0 bg-black/90 z-50 hidden flex-col justify-end">
        <div class="bg-[#121212] w-full max-w-[430px] mx-auto rounded-t-3xl p-6 transition-transform transform translate-y-full overflow-y-auto max-h-[90vh]">
            <div class="w-12 h-1.5 bg-gray-800 rounded-full mx-auto mb-6" onclick="closeDrawer()"></div>
            <h2 id="d-name" class="text-xl font-bold mb-1 text-white text-left"></h2>
            <p id="d-job" class="text-primary text-sm mb-4 text-left"></p>
            
            <div class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800 mb-6 text-left">
                <textarea id="lista-input" placeholder="Lista de materiales..." class="w-full bg-[#0e0e0e] border border-gray-800 rounded-lg p-3 text-sm text-white mb-3 h-24 focus:outline-none"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="enviarWhatsApp('Cliente')" class="bg-[#25D366] text-black text-[10px] py-3 rounded-lg font-bold uppercase">A Cliente</button>
                    <button onclick="enviarWhatsApp('Comercio')" class="bg-white text-black text-[10px] py-3 rounded-lg font-bold uppercase">A Comercio</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#121212] border-t border-gray-800 safe-bottom z-40 max-w-[430px] mx-auto">
        <div class="flex justify-around py-3">
            <button onclick="showPage('pro', 'Profesionales')" class="nav-btn active flex flex-col items-center gap-1">
                <i class="fas fa-user-friends text-lg"></i><span class="text-[9px]">Pro</span>
            </button>
            <button onclick="showPage('tiendas', 'Comercios')" class="nav-btn text-gray-500 flex flex-col items-center gap-1">
                <i class="fas fa-store text-lg"></i><span class="text-[9px]">Tiendas</span>
            </button>
            <button onclick="showPage('pedidos', 'Solicitudes')" class="nav-btn text-gray-500 flex flex-col items-center gap-1">
                <i class="fas fa-clipboard-list text-lg"></i><span class="text-[9px]">Pedidos</span>
            </button>
            <button onclick="showPage('chat', 'Chat')" class="nav-btn text-gray-500 flex flex-col items-center gap-1">
                <i class="fas fa-comment-dots text-lg"></i><span class="text-[9px]">Chat</span>
            </button>
        </div>
    </nav>

    <script>
        function showPage(id, title) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('page-title').innerText = title;
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-gray-500');
            });
            event.currentTarget.classList.add('active');
            event.currentTarget.classList.remove('text-gray-500');
        }
        function openDrawer(name, job) {
            document.getElementById('d-name').innerText = name;
            document.getElementById('d-job').innerText = job;
            document.getElementById('drawer').style.display = 'flex';
            setTimeout(() => { document.querySelector('#drawer > div').style.transform = 'translateY(0)'; }, 10);
        }
        function closeDrawer() {
            document.querySelector('#drawer > div').style.transform = 'translateY(100%)';
            setTimeout(() => { document.getElementById('drawer').style.display = 'none'; }, 300);
        }
        function enviarWhatsApp(target) {
            const text = encodeURIComponent(`*PATAGONIA WALL - ${target}*\n` + document.getElementById('lista-input').value);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
